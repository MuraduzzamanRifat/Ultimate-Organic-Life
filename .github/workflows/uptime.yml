name: Uptime check

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # manual run from the Actions tab

permissions:
  contents: read
  issues: write

concurrency:
  group: uptime
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Probe the live site
        id: probe
        run: |
          URL="https://muraduzzamanrifat.github.io/Ultimate-Organic-Life/"
          echo "Probing $URL"
          code=$(curl -s -o /tmp/body.html -w "%{http_code}" -L --max-time 25 --retry 2 --retry-delay 5 "$URL")
          bytes=$(wc -c < /tmp/body.html)
          echo "HTTP $code · $bytes bytes"
          echo "status=$code"   >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes"   >> "$GITHUB_OUTPUT"
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Site returned HTTP $code"
            exit 1
          fi
          if [ "$bytes" -lt 500 ]; then
            echo "::error::Response suspiciously small ($bytes bytes)"
            exit 1
          fi

      - name: Open / update an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const code  = '${{ steps.probe.outputs.status || "?" }}';
            const bytes = '${{ steps.probe.outputs.bytes || "?" }}';
            const when  = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'Uptime: Pages site unreachable';
            const body  = [
              `Latest probe: **${when}**`,
              `HTTP status: **${code}**`,
              `Body bytes: **${bytes}**`,
              ``,
              `URL: https://muraduzzamanrifat.github.io/Ultimate-Organic-Life/`,
              `Run:  ${runUrl}`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'uptime',
            });

            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['uptime'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            }
