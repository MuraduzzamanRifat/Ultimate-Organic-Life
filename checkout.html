<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — GreenKart Organics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,200;9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="checkout">

<a class="skip" href="#main">Skip to content</a>
<div id="shell-header"></div>

<main id="main">

<section class="page-head">
  <nav class="breadcrumb" aria-label="Breadcrumb"><a href="index.html">Home</a><span>/</span><a href="cart.html">Bag</a><span>/</span><span>Checkout</span></nav>
  <h1>Checkout.</h1>
  <p>A single page. No hidden steps, no surprise fees.</p>
</section>

<section class="co-wrap">
  <form class="co-form" id="coForm">
    <div class="co-step">
      <h3><span>01</span><em>Contact</em></h3>
      <div class="co-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="co-field">
        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" />
      </div>
    </div>

    <div class="co-step">
      <h3><span>02</span><em>Shipping address</em></h3>
      <div class="co-field-row">
        <div class="co-field"><label for="firstName">First name</label><input id="firstName" name="firstName" required autocomplete="given-name"/></div>
        <div class="co-field"><label for="lastName">Last name</label><input id="lastName" name="lastName" required autocomplete="family-name"/></div>
      </div>
      <div class="co-field"><label for="address">Street address</label><input id="address" name="address" required autocomplete="street-address"/></div>
      <div class="co-field"><label for="address2">Apartment, suite (optional)</label><input id="address2" name="address2"/></div>
      <div class="co-field-row">
        <div class="co-field"><label for="city">City</label><input id="city" name="city" required autocomplete="address-level2"/></div>
        <div class="co-field"><label for="state">State</label><input id="state" name="state" required autocomplete="address-level1"/></div>
      </div>
      <div class="co-field-row">
        <div class="co-field"><label for="zip">ZIP / Postal</label><input id="zip" name="zip" required autocomplete="postal-code"/></div>
        <div class="co-field">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option>United States</option>
            <option>Canada</option>
          </select>
        </div>
      </div>
    </div>

    <div class="co-step">
      <h3><span>03</span><em>Delivery method</em></h3>
      <div class="co-radios">
        <label class="co-radio">
          <input type="radio" name="ship" value="standard" checked />
          <span class="co-radio__dot"></span>
          <span class="co-radio__label">
            <strong>Standard</strong>
            <small>Arrives Wed-Fri · Carbon-neutral courier</small>
          </span>
          <span class="co-radio__price">Free over $50</span>
        </label>
        <label class="co-radio">
          <input type="radio" name="ship" value="express" />
          <span class="co-radio__dot"></span>
          <span class="co-radio__label">
            <strong>Express</strong>
            <small>Next-day · Select metros only</small>
          </span>
          <span class="co-radio__price">+$12.00</span>
        </label>
      </div>
    </div>

    <div class="co-step">
      <h3><span>04</span><em>Payment</em></h3>
      <div class="co-radios">
        <label class="co-radio">
          <input type="radio" name="pay" value="card" checked />
          <span class="co-radio__dot"></span>
          <span class="co-radio__label"><strong>Credit / debit card</strong><small>Visa, Mastercard, Amex</small></span>
        </label>
        <label class="co-radio">
          <input type="radio" name="pay" value="paypal" />
          <span class="co-radio__dot"></span>
          <span class="co-radio__label"><strong>PayPal</strong><small>Sign in to PayPal</small></span>
        </label>
      </div>
      <div id="payCard" class="co-pay-card">
        <div class="co-field"><label for="cardNum">Card number</label><input id="cardNum" name="cardNum" placeholder="1234 1234 1234 1234" autocomplete="cc-number"/></div>
        <div class="co-field-row">
          <div class="co-field"><label for="cardExp">Expiry (MM/YY)</label><input id="cardExp" name="cardExp" placeholder="04 / 28" autocomplete="cc-exp"/></div>
          <div class="co-field"><label for="cardCvc">CVC</label><input id="cardCvc" name="cardCvc" placeholder="123" autocomplete="cc-csc"/></div>
        </div>
      </div>
    </div>

    <div class="co-step">
      <label class="co-check">
        <input type="checkbox" required/>
        <span>I agree to the <a href="#">terms of service</a> and <a href="#">privacy policy</a>.</span>
      </label>
      <button type="submit" class="btn-ink btn--block co-submit">Place order <span aria-hidden="true">→</span></button>
      <p class="co-trust">Secure checkout · 128-bit encryption · Your details are never stored.</p>
    </div>
  </form>

  <aside class="co-sum">
    <h3>In your bag</h3>
    <div id="coItems"></div>
    <div class="co-totals">
      <div class="cart-sum__row sub"><span>Subtotal</span><b id="coSub">$0.00</b></div>
      <div class="cart-sum__row ship"><span>Shipping</span><b id="coShip">—</b></div>
      <div class="cart-sum__row tax"><span>Estimated tax</span><b id="coTax">$0.00</b></div>
      <div class="cart-sum__row total"><span>Total</span><b id="coTotal">$0.00</b></div>
    </div>
  </aside>
</section>

</main>

<div id="shell-footer"></div>
<div id="shell-drawer"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
